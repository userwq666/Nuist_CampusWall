spring.application.name=Nuist_CampusWall

spring.datasource.url=jdbc:mysql://localhost:3306/campuswall?useSSL=false&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/db_init.sql
spring.sql.init.data-locations=classpath:sql/db_seed.sql
spring.sql.init.continue-on-error=false

server.port=8080

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

jwt.secret=Nuist_CampusWall_Application@key_wsq
jwt.expire-seconds=7200
jwt.issuer=nuist-campuswall